name: K64 CI

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bison \
          build-essential \
          flex \
          gcc-multilib \
          git \
          grub-common \
          grub-pc-bin \
          mtools \
          python3 \
          qemu-system-x86 \
          rsync \
          xorriso

    - name: Fetch GRUB source headers
      run: |
        git clone --depth 1 https://git.savannah.gnu.org/git/grub.git /tmp/grub-src

    - name: Build and test K64
      env:
        GRUB_SRC: /tmp/grub-src
      run: |
        make clean
        make test

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: k64-build-artifacts
        path: |
          k64.iso
          k64-kernel-v*.elf
