name: K64 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bison \
          build-essential \
          flex \
          gcc-multilib \
          git \
          grub-common \
          grub-pc-bin \
          mtools \
          python3 \
          qemu-system-x86 \
          rsync \
          xorriso

    - name: Fetch GRUB source headers
      run: |
        git clone --depth 1 https://git.savannah.gnu.org/git/grub.git /tmp/grub-src

    - name: Build and test release artifacts
      env:
        GRUB_SRC: /tmp/grub-src
      run: |
        make clean
        make k64.iso
        bash tests/run_shell_cmd_tests.sh
        bash tests/check_grub_cfg.sh
        bash tests/boot_smoke_test.sh

    - name: Compute release version
      id: version
      run: |
        echo "version=$(python3 tools/gen_k64_version.py print)" >> "$GITHUB_OUTPUT"

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: K64 v${{ steps.version.outputs.version }}
        target_commitish: ${{ github.sha }}
        generate_release_notes: true
        files: |
          k64.iso
          k64-kernel-v*.elf
